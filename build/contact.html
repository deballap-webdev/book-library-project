<!doctype html>
<html lang="en" class="font-sans text-fs scroll-smooth bg-gray-600">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Allaputa Deborah" />
    <meta name="description" content="" />
    <title>Online Book Library</title>
    <link rel="icon" href="" type="image/x-icon" />
    <link rel="stylesheet" href="css/main.css" />
  </head>

  <body
    class="md:mx-auto min-h-screen flex flex-col flex-nowrap bg-white max-w-[800px] md:border-x-2 border-x-black dark:text-white dark:bg-black dark:border-x-white shadow-2xl">
    <header class="shrink sticky top-0 z-1">
      <nav
        class="border-b dark:border-none bg-header-bgcolor dark:bg-white dark:text-black">
        <ul class="flex flex-row flex-wrap gap-4 justify-evenly p-2 list-none">
          <li>
            <a
              class="hover:text-link-color focus:text-link-color active:bg-black active:text-white"
              href="/"
              >Home</a
            >
          </li>
          <li>
            <a
              class="hover:text-link-color focus:text-link-color active:bg-black active:text-white"
              href="fiction.html"
              >Fiction</a
            >
          </li>
          <li>
            <a
              class="hover:text-link-color focus:text-link-color active:bg-black active:text-white"
              href="nonfiction.html"
              >Non-Fiction</a
            >
          </li>
          <li>
            <a
              class="hover:text-link-color focus:text-link-color active:bg-black active:text-white"
              href="scifi.html"
              >Scifi</a
            >
          </li>
          <li>
            <a
              class="hover:text-link-color focus:text-link-color active:bg-black active:text-white"
              href="about.html"
              >About</a
            >
          </li>
        </ul>
      </nav>
    </header>
    <hr />

    <main class="grow p-4">
      <h1 class="text-center text-3xl my-8 font-extrabold">Contact Us</h1>
      <form action="https://httpbin.org/post" method="post" class="contact">
        <fieldset class="personal">
          <legend class="font-bold text-[1.3rem] mt-4 mb-2">
            Personal Information
          </legend>
          <p class="mb-8 mx-8">
            <label class="block my-2 w-[75%]">First Name:</label>
            <input
              class="block my-2 w-[75%] border-3 rounded-lg text-[0.8rem4] p-2 font-extralight"
              for="firstName"
              type="text"
              name="firstName"
              id="firstName"
              placeholder="E.g Jane"
              autocomplete="on"
              autofocus
              required />
          </p>

          <p class="m-8">
            <label class="block my-2 w-[75%]" for="lastName">Last Name:</label>
            <input
              class="block my-2 w-[75%] border-3 rounded-lg text-[0.8rem4] p-2 font-extralight"
              type="text"
              name="lastName"
              id="lastName"
              placeholder="E.g Doe"
              autocomplete="on"
              required />
          </p>

          <p class="m-8">
            <label class="block my-2 w-[75%]" for="email">Email:</label>
            <input
              class="block my-2 w-[75%] border-3 rounded-lg text-[0.8rem4] p-2 font-extralight"
              type="email"
              name="email"
              id="email"
              placeholder="E.g random@gmail.com"
              autocomplete="on"
              required />
          </p>

          <p class="m-8">
            <label class="block my-2 w-[75%]" for="phone">Phone:</label>
            <input
              class="block my-2 w-[75%] border-3 rounded-lg text-[0.8rem4] p-2 font-extralight"
              type="tel"
              name="phone"
              id="phone"
              placeholder=" E.g +234807****483"
              autocomplete="on"
              required
              pattern="[+234][7-9][0-1][0-9]{8}" />
          </p>
        </fieldset>

        <fieldset class="contact__fieldset mb-4">
          <legend class="font-bold text-[1.3rem] my-4">
            What is Your Favorite Book Genre
          </legend>

          <p class="mb-2">
            <input
              class="fav-genre__input"
              type="radio"
              name="book-genre"
              id="scifi" />
            <label class="fav-genre__label" for="scifi">Sci-Fi</label>
          </p>

          <p class="mb-2">
            <input
              class="fav-genre__input"
              type="radio"
              name="book-genre"
              id="fiction" />
            <label class="fav-genre__label" for="fiction">Fiction</label>
          </p>

          <p class="mb-2">
            <input
              class="fav-genre__input"
              type="radio"
              name="book-genre"
              id="nonfiction" />
            <label class="fav-genre__label" for="nonfiction">Non Fiction</label>
          </p>
        </fieldset>

        <fieldset class="contact__fieldset message">
          <legend class="font-bold text-[1.3rem] mb-4">
            Send Us A Message
          </legend>
          <textarea
            class="text-[0.8rem] font-extralight border-3 rounded-lg p-2"
            name="message"
            id="message"
            placeholder="Type Your Message Here"
            cols="30"
            rows="10"></textarea>
        </fieldset>

        <button
          class="p-2 rounded-[10px] my-4 mr-2 ml-0 bg-button-color text-white"
          type="submit">
          Send Message
        </button>
        <button
          class="p-2 rounded-[10px] my-4 mr-2 ml-0 bg-button-color text-white"
          type="submit">
          Reset
        </button>
      </form>
    </main>

    <footer
      class="bg-header-bgcolor border-t p-2 text-center dark:bg-white dark:text-black">
      <p>&copy; 2024 Online Book Library</p>
    </footer>
  </body>
</html>
